name: Backend API CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "scripts/**"
      - ".github/workflows/backend-api.yml"
  pull_request:
    paths:
      - "backend/**"
      - "scripts/**"
      - ".github/workflows/backend-api.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import smoke check
        run: python -c "from app.main import app; print(app.title)"

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t nhl-classic-api ./backend
